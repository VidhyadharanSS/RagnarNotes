<!doctype html>
<html lang="en" class="dark" style="color-scheme:dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ragnar-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Ragnar Notes</title>
    <!-- Theme bootstrap — prevents FOUC on reload -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem("ragnar-app-store") || "{}");
          var theme = stored?.state?.preferences?.theme || "dark";
          var resolved = theme === "system"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : theme;
          document.documentElement.classList.add(resolved);
          document.documentElement.classList.remove(resolved === "dark" ? "light" : "dark");
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
    <!-- Inter & JetBrains Mono fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-sans antialiased bg-ragnar-bg-primary text-ragnar-text-primary overflow-hidden select-none">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
