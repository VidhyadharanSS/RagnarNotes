name: "Ragnar Notes — CI/CD"

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & Type Check ──────────────────────────────────────
  lint:
    name: "🔍 Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  # ── 2. Unit Tests ─────────────────────────────────────────────
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── 3. Rust Lint ──────────────────────────────────────────────
  rust-lint:
    name: "🦀 Rust Clippy"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "clippy, rustfmt" }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
      - working-directory: src-tauri
        run: cargo fmt --all -- --check
      - working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── 4. Build macOS App (push to main) ────────────────────────
  build-macos:
    name: "🏗️ Build macOS App"
    runs-on: macos-latest
    needs: [lint, test, rust-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: ragnar-notes-macos-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 30

  # ── 5. Create GitHub Release (on v* tags) ─────────────────────
  release:
    name: "🚀 Release DMG"
    runs-on: macos-latest
    needs: [lint, test, rust-lint]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      # ─ Apple Silicon (arm64)
      - name: Build (Apple Silicon)
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─ Intel (x64)
      - name: Build (Intel)
        run: npm run tauri build -- --target x86_64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect artifacts
        id: artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARM_DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          X64_DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "arm_dmg=$ARM_DMG" >> $GITHUB_OUTPUT
          echo "x64_dmg=$X64_DMG" >> $GITHUB_OUTPUT
          echo "Found: $ARM_DMG | $X64_DMG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Ragnar Notes v${{ steps.artifacts.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📓 Ragnar Notes v${{ steps.artifacts.outputs.version }}

            ### Installation
            1. Download the `.dmg` for your Mac architecture below
            2. Open it and drag **Ragnar Notes** to `/Applications`
            3. If macOS blocks it: **System Settings → Privacy & Security → Open Anyway**

            ### What's in this release
            - 14 font families (sans, serif, monospace)
            - 10 accent color themes
            - Note color labels (8 colors)
            - Hover preview cards on notes
            - Animated welcome screen
            - Full local persistence
            - 132 tests passing

            ### Requirements
            - macOS 12+ (Monterey or later)
          files: |
            ${{ steps.artifacts.outputs.arm_dmg }}
            ${{ steps.artifacts.outputs.x64_dmg }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
